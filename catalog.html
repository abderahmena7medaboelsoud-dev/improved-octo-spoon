<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتالوج المنتجات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F1E4;
    --paper:#FFFFFF;
    --ink:#2A241C;
    --ink-soft:#6B6153;
    --saffron:#C6861F;
    --saffron-dark:#9C6A16;
    --teal:#1F3C40;
    --teal-light:#2C565C;
    --tag:#8A3B2A;
    --line:#E7DCC4;
    --chip-bg:#F1E6CC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }
  h1,h2,h3,.display{font-family:'Cairo', sans-serif;}

  /* Header */
  header{
    background:var(--teal);
    color:#F7F1E4;
    padding:22px 18px 60px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    bottom:-1px; right:0; left:0;
    height:26px;
    background:var(--bg);
    clip-path: polygon(0 100%, 2% 40%, 4% 100%, 6% 45%, 8% 100%, 10% 40%, 12% 100%, 14% 45%, 16% 100%, 18% 40%, 20% 100%, 22% 45%, 24% 100%, 26% 40%, 28% 100%, 30% 45%, 32% 100%, 34% 40%, 36% 100%, 38% 45%, 40% 100%, 42% 40%, 44% 100%, 46% 45%, 48% 100%, 50% 40%, 52% 100%, 54% 45%, 56% 100%, 58% 40%, 60% 100%, 62% 45%, 64% 100%, 66% 40%, 68% 100%, 70% 45%, 72% 100%, 74% 40%, 76% 100%, 78% 45%, 80% 100%, 82% 40%, 84% 100%, 86% 45%, 88% 100%, 90% 40%, 92% 100%, 94% 45%, 96% 100%, 98% 40%, 100% 100%);
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1100px; margin:0 auto;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:46px;height:46px;border-radius:10px;
    background:var(--saffron);
    display:flex;align-items:center;justify-content:center;
    font-size:22px; font-weight:900; color:var(--teal);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
  }
  .brand h1{margin:0; font-size:20px; font-weight:800;}
  .brand p{margin:2px 0 0; font-size:12.5px; color:#C9D6D4; font-family:'Tajawal';}

  .search-wrap{max-width:1100px; margin:26px auto 0;}
  .search-box{
    background:var(--paper);
    border-radius:12px;
    display:flex; align-items:center; gap:10px;
    padding:12px 16px;
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
  }
  .search-box input{
    border:none; outline:none; flex:1; font-size:15px;
    font-family:'Tajawal'; background:transparent; color:var(--ink);
  }
  .search-box svg{flex-shrink:0; opacity:0.5;}

  /* Categories */
  .cats{
    max-width:1100px; margin:22px auto 0;
    display:flex; gap:8px; overflow-x:auto; padding:2px 18px 6px;
    scrollbar-width:none;
  }
  .cats::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0;
    padding:9px 18px; border-radius:999px;
    background:var(--chip-bg); color:var(--teal);
    font-weight:700; font-size:14px; cursor:pointer;
    border:1.5px solid transparent;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .cat-chip.active{
    background:var(--saffron); color:#fff;
    box-shadow:2px 2px 0 rgba(0,0,0,0.12);
  }

  main{max-width:1100px; margin:0 auto; padding:8px 18px 140px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:16px;
    margin-top:14px;
  }

  .card{
    background:var(--paper);
    border-radius:14px;
    border:1px solid var(--line);
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 12px 20px rgba(0,0,0,0.08);}

  .card-img{
    height:120px;
    background:linear-gradient(160deg, #F1E6CC, #E7D8B4);
    display:flex; align-items:center; justify-content:center;
    font-size:46px;
    position:relative;
  }
  .price-tag{
    position:absolute; top:8px; left:8px;
    background:var(--tag); color:#fff;
    font-family:'Cairo'; font-weight:800; font-size:13px;
    padding:5px 10px 5px 8px;
    border-radius:3px 8px 8px 3px;
    display:flex; align-items:center; gap:5px;
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .price-tag::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--bg);
    border:1px solid rgba(255,255,255,0.6);
  }

  .card-body{padding:12px 14px 14px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .card-body h3{margin:0; font-size:16px; font-weight:700;}
  .meta-line{font-size:12.5px; color:var(--ink-soft); display:flex; justify-content:space-between;}

  .flavors{display:flex; flex-wrap:wrap; gap:6px; margin-top:2px;}
  .flavor-chip{
    padding:5px 10px; border-radius:8px; font-size:12px; font-weight:700;
    background:var(--chip-bg); color:var(--teal); cursor:pointer;
    border:1.5px solid transparent;
  }
  .flavor-chip.selected{
    background:var(--teal); color:#fff;
  }

  .qty-row{
    margin-top:auto;
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding-top:6px;
  }
  .stepper{
    display:flex; align-items:center; background:var(--chip-bg); border-radius:8px; overflow:hidden;
  }
  .stepper button{
    width:30px; height:30px; border:none; background:transparent; font-size:17px; font-weight:800;
    color:var(--teal); cursor:pointer;
  }
  .stepper span{width:26px; text-align:center; font-weight:700; font-size:14px;}
  .add-btn{
    background:var(--saffron); color:#fff; border:none; border-radius:8px;
    padding:8px 14px; font-family:'Tajawal'; font-weight:700; font-size:13px;
    cursor:pointer;
  }
  .add-btn:active{transform:scale(0.96);}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }

  /* Floating cart */
  .cart-fab{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--teal); color:#fff;
    border-radius:16px;
    padding:14px 20px;
    display:flex; align-items:center; gap:14px;
    box-shadow:0 14px 30px rgba(0,0,0,0.28);
    max-width:calc(100% - 32px);
    width:520px;
    z-index:50;
  }
  .cart-fab .info{flex:1;}
  .cart-fab .info b{font-family:'Cairo'; font-size:15px;}
  .cart-fab .info span{display:block; font-size:12px; color:#BFD3D0; margin-top:2px;}
  .send-btn{
    background:#25D366; color:#fff; border:none; border-radius:10px;
    padding:10px 16px; font-weight:800; font-family:'Tajawal'; font-size:13.5px;
    cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap;
  }

  /* Modal */
  .modal-bg{
    position:fixed; inset:0; background:rgba(20,15,8,0.55);
    display:none; align-items:flex-end; justify-content:center; z-index:100;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--paper); width:100%; max-width:520px;
    border-radius:18px 18px 0 0; padding:20px;
    max-height:80vh; overflow-y:auto;
  }
  .modal h2{margin:0 0 12px; font-size:18px;}
  .order-line{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--line); font-size:14px;
  }
  .order-line .del{color:var(--tag); cursor:pointer; font-size:13px; font-weight:700; margin-right:10px;}
  .field{margin-top:14px;}
  .field label{font-size:13px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:5px;}
  .field input{
    width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid var(--line);
    font-family:'Tajawal'; font-size:14px; outline:none;
  }
  .field input:focus{border-color:var(--saffron);}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .close-btn{
    flex:1; background:var(--chip-bg); border:none; border-radius:10px; padding:12px; font-weight:700; cursor:pointer;
  }
  .confirm-btn{
    flex:2; background:#25D366; color:#fff; border:none; border-radius:10px; padding:12px; font-weight:800; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">ب</div>
      <div>
        <h1>كتالوج البدر للمواد الغذائية</h1>
        <p>اختار الصنف وابعت الطلب على واتساب في ثانية</p>
      </div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="ابحث عن منتج... (شيبسي، جبنة، مياه)">
    </div>
  </div>
</header>

<div class="cats" id="catBar"></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">مفيش منتجات مطابقة للبحث</div>
</main>

<div class="cart-fab" id="cartFab" style="display:none;">
  <div class="info">
    <b id="cartCount">0 أصناف في الطلب</b>
    <span id="cartTotal">الإجمالي التقريبي: 0 جنيه</span>
  </div>
  <button class="send-btn" onclick="openOrderModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.06-1.33A9.94 9.94 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.65 0-3.2-.46-4.52-1.26l-.32-.19-3.01.79.8-2.93-.21-.3A7.94 7.94 0 0 1 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
    مراجعة الطلب
  </button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>طلبك</h2>
    <div id="orderLines"></div>
    <div class="field">
      <label>اسم المحل</label>
      <input id="shopName" type="text" placeholder="مثال: بقالة النور">
    </div>
    <div class="field">
      <label>العنوان / المنطقة</label>
      <input id="shopAddr" type="text" placeholder="مثال: شارع الجمهورية، كفر الشيخ">
    </div>
    <div class="modal-actions">
      <button class="close-btn" onclick="closeOrderModal()">رجوع</button>
      <button class="confirm-btn" onclick="sendToWhatsapp()">إرسال على واتساب</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   بيانات المنتجات — عدّل هنا لإضافة/تعديل منتجاتكم الحقيقية
   image: تقدر تحط رابط صورة حقيقي بدل الإيموجي هنا لو حبيت
   ============================================================ */
const WHATSAPP_NUMBER = "201000000000"; // رقم والدك بصيغة دولية بدون + أو أصفار زيادة

const PRODUCTS = [
  { id:1, name:"شيبسي ذرة", category:"بقالة", icon:"🌽", flavors:["ملح وخل","طماطم","جبنة"], price:180, unitsPerCarton:24 },
  { id:2, name:"بسكويت شاي", category:"بقالة", icon:"🍪", flavors:["سادة","بالشوكولاتة"], price:96, unitsPerCarton:48 },
  { id:3, name:"جبنة مثلثات", category:"ألبان", icon:"🧀", flavors:["كلاسيك"], price:210, unitsPerCarton:24 },
  { id:4, name:"لبن كامل الدسم", category:"ألبان", icon:"🥛", flavors:["1 لتر","نصف لتر"], price:340, unitsPerCarton:12 },
  { id:5, name:"مياه معدنية", category:"مشروبات", icon:"💧", flavors:["600 مل","1.5 لتر"], price:60, unitsPerCarton:12 },
  { id:6, name:"عصير مانجو", category:"مشروبات", icon:"🥭", flavors:["مانجو","فراولة","برتقال"], price:144, unitsPerCarton:24 },
  { id:7, name:"طماطم مصبرة", category:"معلبات", icon:"🥫", flavors:["حجم صغير","حجم كبير"], price:120, unitsPerCarton:24 },
  { id:8, name:"فول معلب", category:"معلبات", icon:"🫘", flavors:["سادة","بالزيت"], price:132, unitsPerCarton:24 },
  { id:9, name:"شوكولاتة", category:"بقالة", icon:"🍫", flavors:["حليب","دارك","بندق"], price:150, unitsPerCarton:20 },
];

const CATEGORIES = ["الكل", ...new Set(PRODUCTS.map(p=>p.category))];

let selectedFlavor = {};   // productId -> flavor
let qty = {};              // productId -> qty
let cart = {};             // productId -> {flavor, qty}
let activeCat = "الكل";
let searchTerm = "";

function renderCats(){
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATEGORIES.map(c => `
    <div class="cat-chip ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</div>
  `).join('');
}
function setCat(c){ activeCat = c; renderCats(); renderGrid(); }

document.getElementById('searchInput').addEventListener('input', e=>{
  searchTerm = e.target.value.trim();
  renderGrid();
});

function renderGrid(){
  const grid = document.getElementById('grid');
  const filtered = PRODUCTS.filter(p=>{
    const matchCat = activeCat === "الكل" || p.category === activeCat;
    const matchSearch = !searchTerm || p.name.includes(searchTerm) || p.flavors.some(f=>f.includes(searchTerm));
    return matchCat && matchSearch;
  });

  document.getElementById('emptyState').style.display = filtered.length ? 'none':'block';

  grid.innerHTML = filtered.map(p=>{
    if(!(p.id in selectedFlavor)) selectedFlavor[p.id] = p.flavors[0];
    if(!(p.id in qty)) qty[p.id] = 1;
    const pricePerUnit = (p.price / p.unitsPerCarton).toFixed(1);
    return `
    <div class="card">
      <div class="card-img">
        <span>${p.icon}</span>
        <div class="price-tag">${p.price} ج / كرتونة</div>
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="meta-line">
          <span>${p.unitsPerCarton} كيس/كرتونة</span>
          <span>~${pricePerUnit} ج/كيس</span>
        </div>
        <div class="flavors">
          ${p.flavors.map(f => `
            <div class="flavor-chip ${selectedFlavor[p.id]===f?'selected':''}" onclick="pickFlavor(${p.id}, '${f}')">${f}</div>
          `).join('')}
        </div>
        <div class="qty-row">
          <div class="stepper">
            <button onclick="changeQty(${p.id}, -1)">−</button>
            <span id="qty-${p.id}">${qty[p.id]}</span>
            <button onclick="changeQty(${p.id}, 1)">+</button>
          </div>
          <button class="add-btn" onclick="addToCart(${p.id})">إضافة للطلب</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function pickFlavor(id, flavor){
  selectedFlavor[id] = flavor;
  renderGrid();
}
function changeQty(id, delta){
  qty[id] = Math.max(1, (qty[id]||1) + delta);
  document.getElementById(`qty-${id}`).textContent = qty[id];
}
function addToCart(id){
  const p = PRODUCTS.find(x=>x.id===id);
  const key = `${id}-${selectedFlavor[id]}`;
  cart[key] = {
    product: p.name,
    flavor: selectedFlavor[id],
    qty: qty[id],
    price: p.price
  };
  qty[id] = 1;
  renderGrid();
  updateCartFab();
}
function removeFromCart(key){
  delete cart[key];
  updateCartFab();
  renderOrderLines();
}

function updateCartFab(){
  const items = Object.values(cart);
  const fab = document.getElementById('cartFab');
  if(items.length === 0){ fab.style.display='none'; return; }
  fab.style.display='flex';
  const total = items.reduce((s,i)=> s + i.price*i.qty, 0);
  document.getElementById('cartCount').textContent = `${items.length} أصناف في الطلب`;
  document.getElementById('cartTotal').textContent = `الإجمالي التقريبي: ${total} جنيه`;
}

function openOrderModal(){
  renderOrderLines();
  document.getElementById('modalBg').classList.add('open');
}
function closeOrderModal(){
  document.getElementById('modalBg').classList.remove('open');
}
function renderOrderLines(){
  const wrap = document.getElementById('orderLines');
  const items = Object.entries(cart);
  if(items.length===0){
    wrap.innerHTML = `<p style="color:var(--ink-soft); font-size:14px;">السلة فاضية.</p>`;
    return;
  }
  wrap.innerHTML = items.map(([key,i])=>`
    <div class="order-line">
      <span>${i.product} (${i.flavor}) × ${i.qty} كرتونة</span>
      <span><span class="del" onclick="removeFromCart('${key}')">حذف</span></span>
    </div>
  `).join('');
}

function sendToWhatsapp(){
  const items = Object.values(cart);
  if(items.length===0){ alert('السلة فاضية، ضيف منتجات الأول'); return; }
  const shop = document.getElementById('shopName').value.trim();
  const addr = document.getElementById('shopAddr').value.trim();

  let msg = `طلب جديد من الموقع 🧾\n\n`;
  if(shop) msg += `المحل: ${shop}\n`;
  if(addr) msg += `العنوان: ${addr}\n`;
  msg += `\nالأصناف:\n`;
  items.forEach(i=>{
    msg += `• ${i.product} - ${i.flavor} × ${i.qty} كرتونة\n`;
  });
  const total = items.reduce((s,i)=> s + i.price*i.qty, 0);
  msg += `\nالإجمالي التقريبي: ${total} جنيه`;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  closeOrderModal();
}

renderCats();
renderGrid();
</script>
</body>
</html>
